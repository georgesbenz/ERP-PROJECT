# ERP Platform — Local Development
#
# Cold-start (first time):
#   cp .env.example .env          # copy default env
#   docker compose up --build     # build images + start everything
#
# Subsequent starts:
#   docker compose up             # fast — images already built
#
# Services:
#   postgres   :5432  — PostgreSQL 16
#   redis      :6379  — Redis 7
#   backend    :4000  — NestJS API  (/api/v1, /api/docs)
#   frontend   :3000  — Next.js 14
#   nginx      :8080  — Reverse proxy (single entry point)
#   redis-ui   :8081  — Redis Commander (dev only)

services:

  # ── Database ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: erp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-erp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp_secret}
      POSTGRES_DB:       ${POSTGRES_DB:-erp}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-erp} -d ${POSTGRES_DB:-erp}"]
      interval: 5s
      timeout:  5s
      retries:  10

  # ── Cache / Queues ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: erp_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout:  3s
      retries:  5

  # ── Backend (NestJS) ────────────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
      target:     development
    container_name: erp_backend
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV:     ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql://erp:erp_secret@postgres:5432/erp?schema=public}
      REDIS_URL:    ${REDIS_URL:-redis://redis:6379}
      PORT:         ${BACKEND_PORT:-4000}
      JWT_ACCESS_SECRET:  ${JWT_ACCESS_SECRET:-change_me_access_secret_32chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh_secret_32chars}
      CORS_ORIGIN:  ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    volumes:
      - ./backend:/app
      - backend_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:     ["CMD-SHELL", "wget -qO- http://localhost:4000/api/v1/health || exit 1"]
      interval: 15s
      timeout:  5s
      retries:  5
      start_period: 60s

  # ── Frontend (Next.js) ──────────────────────────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      target:     development
    container_name: erp_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
      NEXT_PUBLIC_WS_URL:  ${NEXT_PUBLIC_WS_URL:-http://localhost:4000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - backend

  # ── Reverse Proxy ───────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: erp_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

  # ── Dev Tools ───────────────────────────────────────────────────────────────
  redis-ui:
    image: rediscommander/redis-commander:latest
    container_name: erp_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  backend_modules:
  frontend_modules:
  frontend_next:
