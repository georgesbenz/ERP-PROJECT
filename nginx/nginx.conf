# Reverse proxy: single entry point for web app + API + WebSocket.
# Proxy inverse : point d'entrée unique pour le front, l'API et le WebSocket.
# In production, terminate TLS here (listen 443 ssl) and add security headers.

resolver 127.0.0.11 valid=10s ipv6=off;

# ── Gzip compression ─────────────────────────────────────────────────────────
gzip              on;
gzip_vary         on;
gzip_proxied      any;
gzip_comp_level   6;
gzip_buffers      16 8k;
gzip_http_version 1.1;
gzip_min_length   256;
gzip_types
  text/plain text/css text/xml text/javascript
  application/javascript application/x-javascript application/json
  application/xml application/rss+xml application/atom+xml
  image/svg+xml font/ttf font/otf font/woff font/woff2;

upstream frontend_upstream {
    server frontend:3000;
    keepalive 32;
}

upstream backend_upstream {
    server backend:4000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    # ── Next.js static assets — long-lived browser cache ─────────────────────
    location /_next/static/ {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── API REST ──────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store";
    }

    # ── WebSocket (Socket.io real-time) ───────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # ── Frontend (Next.js) ────────────────────────────────────────────────────
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
