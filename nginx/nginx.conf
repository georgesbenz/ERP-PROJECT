# Reverse proxy: single entry point for web app + API + WebSocket.
# Proxy inverse : point d'entrée unique pour le front, l'API et le WebSocket.
# In production, terminate TLS here (listen 443 ssl) and add security headers.

resolver 127.0.0.11 valid=10s ipv6=off;

upstream frontend_upstream {
    server frontend:3000;
}

upstream backend_upstream {
    server backend:4000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    # --- API REST ---
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- WebSocket (Socket.io real-time) ---
    location /socket.io/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # --- Frontend (Next.js) ---
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
